<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
<style>
    body{
        background-color: rgb(39, 36, 36);
    }
    .container{
        display: flex;
        height:100vh;
        flex-direction: column;
        justify-content: center;
        align-items: center;
       
        }
        .containerNum div{
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }
        .containerNum button{
            color: white;
            background-color:grey;
            height: 50px;
            width: 50px;
        }
        .containerNum button:hover{
            background-color: rgb(74, 73, 73);
        }
        .or button{
            background-color: rgb(225, 146, 0);
        }
        .or button:hover{
            background-color: rgb(255, 191, 72);

        }
        .containerNum button.or{
            background-color: rgb(225, 146, 0);
        }
        .containerNum button.or:hover{
            background-color: rgb(255, 191, 72);
        }
        .visor{
            color: white;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            background-color: black;
            height: 100px;
            width: 215px;
            margin-bottom: 10px;
            font-size: 32px;
            padding: 10px 15px;
        }
        
</style>
</head>
<body>
    
    <div class="container">
        <div class="visor">sssssss</div>
    
    <div class="containerNum">
    <div class="or">
    <button>AC</button>
    <button>&lt;</button>
    <button>%</button>
    <button>+</button>
    </div>
<div>
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="or">-</button>
</div>
<div>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="or">&times;</button>
</div>
<div>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="or">&divide;</button>
</div>
<div>

<button>&diamondsuit;</button>
<button>0</button>
<button>.</button>
<button class="or">=</button>
</div>
        </div>
    </div>

    
    </body>
</body>
</html>

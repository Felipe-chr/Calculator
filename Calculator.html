<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
<style>
    *{
        box-sizing: border-box;
    }
    body{
        background-color: rgb(37, 37, 41);
    }
    .container{
        display: flex;
        height:100vh;
        flex-direction: column;
        justify-content: center;
        align-items: center;       
        }
        .containerNum div{
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }
        .containerNum button{
            color: white;
            background-color:grey;
            height: 50px;
            width: 50px;
            border: none;
            border-radius: 20%;
        }
        .containerNum button:hover{
            background-color: rgb(74, 73, 73);
        }
        .or button{
            background-color: rgb(225, 146, 0);
        }
        .or button:hover{
            background-color: rgb(255, 191, 72);

        }
        .containerNum button.or{
            background-color: rgb(225, 146, 0);
        }
        .containerNum button.or:hover{
            background-color: rgb(255, 191, 72);
        }
        .visor{
            color: white;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            background-color: black;
            height: 100px;
            width: 215px;
            margin-bottom: 10px;
            font-size: 32px;
            padding: 10px 15px;
            border-radius: 8%;
            overflow:auto;
            white-space: nowrap;
            border: 2px solid #00f0ff;
            box-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff, inset 0 0 10px #00f0ff;
            animation: neon-pulsar 2s infinite alternate;
        }
        @keyframes neon-pulsar {
    0% {
        box-shadow: 0 0 5px #00f0ff, 0 0 15px #00f0ff, inset 0 0 5px #00f0ff;
        filter: brightness(0.9);
    }
    100% {
        box-shadow: 0 0 15px #00f0ff, 0 0 30px #00f0ff, inset 0 0 15px #00f0ff;
        filter: brightness(1.2);
    }
}

</style>
</head>
<body>
    
<div class="container">
    <div class="visor">0</div>
    
    <div class="containerNum">
    <div class="or">
    <button>AC</button>
    <button>&lt;</button>
    <button>%</button>
    <button>+</button>
        </div>
        <div>
    <button id="um">1</button>
    <button id="dois">2</button>
    <button id="tres">3</button>
    <button id="menos" class="or">-</button>
        </div>
        <div>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="or">&times;</button>
        </div>
        <div>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="or">&divide;</button>
        </div>
        <div>

<button>&diamondsuit;</button>
<button>0</button>
<button>.</button>
<button class="or">=</button>
        </div>
    </div>
</div>

<script>
    const visor = document.querySelector('.visor');
    const buttons = document.querySelectorAll('.containerNum button')

    buttons.forEach(button =>{
        button.addEventListener('click', ()=>{
            const textButton = button.innerText;

            if(textButton==='AC'){
                visor.innerText = '0'
                return;
            }
            if(textButton==='<'){
                if(visor.innerText.length > 1){
                   visor.innerText = visor.innerText.slice(0, -1);
                }
                else{
                    visor.innerText = '0'
                }
                return;
            }

            if(textButton==='='){
                try{
                    let expression = visor.innerText;
                    expression = expression.replace(/&times;/g, '*').replace(/×/g, '*');
                    expression = expression.replace(/&divide;/g, '/').replace(/÷/g, '/');
               visor.innerText = eval(expression);
                } catch(error){
                    visor.innerText = 'Erro';
                }
                return;
            }

            if(visor.innerText==='0' ||visor.innerText==='Erro'){
                visor.innerText = textButton;
            }
            else{
                visor.innerText += textButton;
            }

        });
    });

</script>
    
    </body>
</body>
</html>
